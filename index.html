<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>বাংলা থেকে ফ্লোচার্ট</title>

  <link href="https://fonts.googleapis.com/css?family=Hing+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowchart/1.15.0/flowchart.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/esprima/dist/esprima.min.js"></script>
</head>
<body>

<header>
  <h1>বাংলা থেকে ফ্লোচার্ট</h1>
  <p>বাংলা কোড থেকে ফ্লোচার্ট তৈরি করুন এবং রান করুন</p>
</header>

<main class="container">
  <div class="editor-section">
    <span class="section-title">জাভাস্ক্রিপ্ট কোড</span>
    <div id="editor"></div>
  </div>

    <button onclick="generateFlowchart()">ফ্লোচার্ট তৈরি করুন</button>
    <br><br>

  <div class="flowchart-section">
    <span class="section-title">ফ্লোচার্ট আউটপুট</span>
    <div id="output"></div>
  </div><br>
  <button onclick="runCode()">কোড রান করুন</button>
  <br><br>

  <div class="console-section">
    <span class="section-title">কনসোল আউটপুট</span>
    <pre id="console"></pre>
  </div>
  <a href="https://github.com/AnisurRahmanJU/Bangla2Flow/blob/main/README.md " target="_blank"><button type="btn btn-info">উদাহরণ দেখুন</button></a>
</main>

<script src="flowchart.js"></script>

</body>
</html>
