<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" ="width=device-width,initial-scale=1">
<title>Bangla2Flow Smart Flowchart IDE</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">

<link rel="stylesheet" href="styles.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flowchart/1.17.1/flowchart.min.js"></script>
</head>

<body>
<div class="container py-3">
    <h2 class="text-center logo mb-4">Bangla<span>2</span>Flow</h2>

    <div class="editor-section shadow">
        <div class="editor-title">বাংলা এডিটর</div>
        <textarea id="banglaCode">চলক সংখ্যা = ১০;
যদি (সংখ্যা > ৫) {
দেখাও("সংখ্যাটি বড়");
} নাহলে {
দেখাও("সংখ্যাটি ছোট");
}</textarea>
        <div class="btn-group-custom">
            <button onclick="generateFlow()" class="btn btn-success">Flow Generate</button>
            <button onclick="generateJS()" class="btn btn-primary">Code Generate</button>
            <button onclick="runCode()" class="btn btn-warning">Run Code</button>
            <a href="https://github.com/AnisurRahmanJU/Bangla2Flow/blob/main/README.md" target="_blank"><button class="btn btn-success">Code Examples</button></a>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-6 mb-3">
            <div class="preview-card">
                <div class="label">Flowchart Visualizer</div>
                <div id="flowchart"></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="preview-card">
                <div class="label">Generated JS</div>
                <pre id="jsCode"></pre>
                <div class="label mt-3">Console Output</div>
                <pre id="output" class="text-success"></pre>
            </div>
        </div>
    </div>
</div>

<script src="flowchart.js"></script>
</body>
</html>
