<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>বাংলা থেকে ফ্লোচার্ট</title>

  <link href="https://fonts.googleapis.com/css?family=Hing+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowchart/1.15.0/flowchart.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/esprima/dist/esprima.min.js"></script>
</head>
<body>

<header>
  <h1>বাংলা থেকে ফ্লোচার্ট</h1>
  <p>বাংলা কোড থেকে ফ্লোচার্ট তৈরি করুন এবং রান করুন</p>
</header>

<main class="container">
  <div class="editor-section">
    <span class="section-title">বাংলা কোড ইডিটর:</span>
    <div id="editor"></div>
  </div>

    <button onclick="generateFlowchart()">ফ্লোচার্ট তৈরি করুন:</button>
    <br><br>

  <div class="flowchart-section">
    <span class="section-title">ফ্লোচার্ট আউটপুট:</span>
    <div id="output"></div>
  </div><br>

  <!-- ✅ SAME LINE BUTTON -->
  <button onclick="runCode()">কোড রান করুন</button>
  <button onclick="downloadImage()">ডাউনলোড ফ্লোচার্ট</button>

  <br><br>

  <div class="console-section">
    <span class="section-title">কনসোল আউটপুট:</span>
    <pre id="console"></pre>
  </div>

  <a href="https://github.com/AnisurRahmanJU/Bangla2Flow/blob/main/README.md " target="_blank">
    <button type="btn btn-info">উদাহরণ দেখুন</button>
  </a>
</main>

<script src="flowchart.js"></script>
<script>
  // পুরাতন console.log কে ধরে রাখা
  const originalLog = console.log;

  // ইংরেজি সংখ্যাকে বাংলা সংখ্যায় রূপান্তরের ম্যাপিং
  const engToBengaliMap = {
    '0': '০', '1': '১', '2': '২', '3': '৩', '4': '৪',
    '5': '৫', '6': '৬', '7': '৭', '8': '৮', '9': '৯'
  };

  function toBengaliNumbers(input) {
    return input.toString().replace(/\d/g, (match) => engToBengaliMap[match]);
  }

  // console.log কে রি-ডিফাইন করা
  console.log = function(...args) {
    const formattedArgs = args.map(arg => {
      // Boolean চেক করা
      if (arg === true) return "সত্য";
      if (arg === false) return "মিথ্যা";
      
      // সংখ্যা হলে রূপান্তর করা (যদি স্ট্রিং এর ভেতরেও থাকে)
      if (typeof arg === 'number') return toBengaliNumbers(arg);
      if (typeof arg === 'string') return toBengaliNumbers(arg);
      
      return arg;
    });

    // আসল console.log ব্যবহার করে কনসোলে দেখানো
    originalLog.apply(console, formattedArgs);

    // আপনার ওয়েবপেজের <pre id="console"> এ দেখানো
    const consoleDiv = document.getElementById('console');
    if (consoleDiv) {
      consoleDiv.innerHTML += formattedArgs.join(' ') + '\n';
    }
  };

  // পরীক্ষা করার জন্য: (আপনার runCode() ফাংশনের ভেতর এগুলো ব্যবহার করবেন)
  // console.log(12345);      // আউটপুট: ১২৩৪৫
  // console.log(true);       // আউটপুট: সত্য
  // console.log(false);      // আউটপুট: মিথ্যা
</script>
</body>
</html>
