<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>বাংলা থেকে ফ্লোচার্ট</title>

  <link href="https://fonts.googleapis.com/css?family=Hing+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowchart/1.15.0/flowchart.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/esprima/dist/esprima.min.js"></script>
</head>
<body>

<header>
  <h1>বাংলা থেকে ফ্লোচার্ট</h1>
  <p>বাংলা কোড থেকে ফ্লোচার্ট তৈরি করুন এবং রান করুন</p>
</header>

<main class="container">
  <div class="editor-section">
    <span class="section-title">বাংলা কোড ইডিটর:</span>
    <div id="editor"></div>
  </div>

    <button onclick="generateFlowchart()">ফ্লোচার্ট তৈরি করুন:</button>
    <br><br>

  <div class="flowchart-section">
    <span class="section-title">ফ্লোচার্ট আউটপুট:</span>
    <div id="output"></div>
  </div><br>

  <!-- ✅ SAME LINE BUTTON -->
  <button onclick="runCode()">কোড রান করুন</button>
  <button onclick="downloadImage()">ডাউনলোড ফ্লোচার্ট</button>

  <br><br>

  <div class="console-section">
    <span class="section-title">কনসোল আউটপুট:</span>
    <pre id="console"></pre>
  </div>

  <a href="https://github.com/AnisurRahmanJU/Bangla2Flow/blob/main/README.md " target="_blank">
    <button type="btn btn-info">উদাহরণ দেখুন</button>
  </a>
</main>

<script src="flowchart.js"></script>
<script>
  (function() {
    // পুরাতন console.log সেভ করে রাখা
    const originalLog = console.log;

    // ইংরেজি থেকে বাংলা সংখ্যার ম্যাপিং টেবিল
    const engToBengaliDigits = {
      '0': '০', '1': '১', '2': '২', '3': '৩', '4': '৪',
      '5': '৫', '6': '৬', '7': '৭', '8': '৮', '9': '৯'
    };

    // রূপান্তর করার মূল ফাংশন
    function translateToBangla(input) {
      if (input === true) return "সত্য";
      if (input === false) return "মিথ্যা";
      
      // input-কে স্ট্রিংয়ে রূপান্তর করে ইংরেজি সংখ্যাগুলো খুঁজে বের করে বদলে দেওয়া
      return String(input).replace(/\d/g, (digit) => engToBengaliDigits[digit]);
    }

    // console.log রি-রাইট করা
    console.log = function(...args) {
      // প্রতিটি আর্গুমেন্টকে রূপান্তর করা (যেমন: ক2 -> ক২, 13 -> ১৩)
      const translatedArgs = args.map(arg => translateToBangla(arg));
      
      // ব্রাউজার কনসোলে আসল আউটপুট দেখানো
      originalLog.apply(console, translatedArgs);

      // আপনার HTML-এর 'console' আইডি যুক্ত এলিমেন্টে আউটপুট দেখানো
      const consoleOutput = document.getElementById('console');
      if (consoleOutput) {
        // নতুন লাইনসহ আউটপুট যোগ করা
        const message = translatedArgs.join(' ');
        consoleOutput.innerText += message + '\n';
        
        // অটো-স্ক্রল নিচে রাখা
        consoleOutput.scrollTop = consoleOutput.scrollHeight;
      }
    };
  })();
</script> 
</body>
</html>
