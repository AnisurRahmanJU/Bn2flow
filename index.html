<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>বাংলা ➝ ফ্লোচার্ট</title>

  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowchart/1.15.0/flowchart.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/esprima/dist/esprima.min.js"></script>
</head>
<body>

<header>
  <h1><b>বাংলা ➝ ফ্লোচার্ট</b></h1>
  <p>বাংলা কোড থেকে ফ্লোচার্ট তৈরি করুন এবং রান করুন</p>
</header>

<main class="container">
  <div class="editor-section">
    <span class="section-title">বাংলা কোড ইডিটর:</span>
    <div id="editor"></div>
  </div>

    <button onclick="generateFlowchart()">ফ্লোচার্ট তৈরি করুন</button>
    <br><br>

  <div class="flowchart-section">
    <span class="section-title">ফ্লোচার্ট আউটপুট:</span>
    <div id="output"></div>
  </div><br>

  <!-- ✅ SAME LINE BUTTON -->
  <button id="runBtn" onclick="runCode()" disabled>Run</button>
  <button onclick="downloadImage()">ডাউনলোড ফ্লোচার্ট</button>

  <br><br>

  <div class="console-section">
    <span class="section-title">কনসোল আউটপুট:</span>
    <pre id="console"></pre>
  </div>

  <a href="https://github.com/AnisurRahmanJU/Bangla2Flow/blob/main/README.md " target="_blank">
    <button type="btn btn-info">উদাহরণ দেখুন</button>
  </a>
</main>

<script src="flow.js"></script>

<script>
  function runCode() {
  const consoleEl = document.getElementById("console");
  consoleEl.innerText = "";

  const code = banglaToJS(editor.getValue());
  const originalLog = console.log;

  function convertToBangla(value) {
    if (typeof value === "number") {
      return enNumberToBn(value);
    }

    if (typeof value === "boolean") {
      return value ? "সত্য" : "মিথ্যা";
    }

    if (Array.isArray(value)) {
      return "[" + value.map(v => convertToBangla(v)).join(", ") + "]";
    }

    if (typeof value === "object" && value !== null) {
      let objStr = "{ ";
      objStr += Object.entries(value)
        .map(([k, v]) => `${k}: ${convertToBangla(v)}`)
        .join(", ");
      objStr += " }";
      return objStr;
    }

    if (typeof value === "string") {
      return enNumberToBn(value);
    }

    return value;
  }

  console.log = (...args) => {
    const bnArgs = args.map(arg => convertToBangla(arg));
    consoleEl.innerText += bnArgs.join(" ") + "\n";
  };

  try {
    eval(code);
  } catch (err) {
    consoleEl.innerText += "Error: " + err.message;
  }

  console.log = originalLog;
}

// English → Bangla number
function enNumberToBn(text) {
  const map = { "0":"০","1":"১","2":"২","3":"৩","4":"৪","5":"৫","6":"৬","7":"৭","8":"৮","9":"৯" };
  return text.toString().replace(/[0-9]/g, d => map[d]);
}
</script>
  
<script>
// ================== SYNTAX HIGHLIGHT ==================
const customOverlay = {
  token: function(stream) {

    // Comment
    if (stream.match(/^\/\/.*/)) return "comment-custom";

    // String
    if (stream.match(/^"(?:[^"\\]|\\.)*"/) || stream.match(/^'(?:[^'\\]|\\.)*'/)) {
      return "string-custom";
    }

    // Bangla Keywords (purple)
    if (stream.match(/^(যদি|নাহলে যদি|নাহলে|চলক|ধরি|ধ্রুবক|সত্য|মিথ্যা|এবং|অথবা|সুইচ|কেস|ডিফল্ট|নাল|বাদ|যতক্ষণ|করো|থামো|ফেরত|ফাংশন|লুপ)(?![\u0980-\u09FF\w])/)) {
      return "keyword-custom";
    }

    // Function call (blue)
    if (stream.match(/^([\u0980-\u09FF\w_]+)\s*\(/)) {
      return "func-call";
    }

    // Object after dot (orange)
    if (stream.match(/^\.\s*([\u0980-\u09FF\w_]+)/)) {
      return "object-access";
    }

    // Bangla number (limegreen)
    if (stream.match(/^[০-৯]+(\.[০-৯]+)?/)) {
      return "bangla-number";
    }

    //  Variable (gray)
    if (stream.match(/^[a-zA-Z_\u0980-\u09FF][a-zA-Z0-9_\u0980-\u09FF\u09E6-\u09EF]*/)) {
      return "variable-custom";
    }

    stream.next();
    return null;
  }
};

// ================== APPLY OVERLAY AFTER EDITOR LOAD ==================
function applyCustomHighlight() {
  if (editor) {
    editor.addOverlay(customOverlay);
  } else {
    console.error("Editor not initialized!");
  }
}

// ================== FIX: WAIT UNTIL EDITOR READY ==================
window.addEventListener("load", function () {
  setTimeout(() => {
    applyCustomHighlight();
  }, 200); // ছোট delay যাতে editor ready হয়
});
</script>
</body>
</html>
